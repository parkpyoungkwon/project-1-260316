<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>클래식 테트리스</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page">
      <header class="header">
        <h1>클래식 테트리스</h1>
        <p class="subtitle">방향키로 조작하는 브라우저 테트리스 (PC 전용)</p>
      </header>

      <main class="main">
        <section class="game-container">
          <canvas id="board" width="300" height="600" tabindex="0"></canvas>
          <aside class="side-panel">
            <div class="next-wrapper">
              <h2>Next</h2>
              <canvas id="next" width="120" height="120"></canvas>
            </div>

            <div class="action-buttons">
              <button id="pause-btn" class="btn btn-secondary">일시정지</button>
              <button id="restart-btn" class="btn">새 게임</button>
            </div>

            <div class="stats">
              <div><span>점수</span><strong id="score">0</strong></div>
              <div><span>레벨</span><strong id="level">1</strong></div>
              <div><span>줄 수</span><strong id="lines">0</strong></div>
            </div>

            <div class="controls-info">
              <h2>방향키 설명</h2>
              <ul>
                <li>← / → : 좌우 이동</li>
                <li>↑ : 회전</li>
                <li>↓ : 빠르게 내리기</li>
                <li>Space : 하드 드롭</li>
                <li>Enter : 일시정지 / 재개</li>
              </ul>
            </div>
          </aside>
        </section>

        <section class="info">
          <p>
            GitHub Pages에 올려서 바로 웹에서 플레이할 수 있는
            초중급용 클래식 테트리스입니다.
          </p>
        </section>
      </main>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-content">
        <h2 id="overlay-title">일시정지</h2>
        <p id="overlay-text"></p>
        <button id="overlay-btn" class="btn">계속하기</button>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
